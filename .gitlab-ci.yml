stages:
  - build

build:
  # The official ghcr.io/getzola/zola image only contains the zola binary
  # (no shell), which the GitLab docker executor cannot run scripts in, so
  # install a pinned zola release into a plain alpine image instead.
  image: alpine:3.22
  stage: build
  tags:
    - trusted
  variables:
    ZOLA_VERSION: v0.22.1
  script:
    - wget -qO- "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /usr/local/bin zola
    - zola build
  artifacts:
    paths:
      - dist
    # Keep the latest successful build available indefinitely so the
    # ansible deploy on the new server can pull from
    # /jobs/artifacts/master/download?job=build without the build
    # going stale and 404'ing.
    expire_in: never
