{% extends "base.html" %}
{% import "macros.html" as macros %}

{% block content %}
<main class="content main-content">
	<h1>News archive</h1>
	<a href="{{ config.extra.news_rss }}" target="_blank" rel="noopener" title="RSS feed" aria-label="open the RSS feed" class="feed"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg></a>
	{%- set news = load_data(url=config.extra.news_json, format="json") %}
	{{ macros::news_entries(entries=news) }}
</main>
{% endblock content %}
